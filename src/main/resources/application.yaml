spring:
  application:
    name: panelvault
  datasource:
    url: jdbc:postgresql://localhost:5432/panel_vault
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    time-zone: America/Sao_Paulo

api:
  security:
    token:
      secret: ${JWT_SECRET:secret-change-me-in-production}
